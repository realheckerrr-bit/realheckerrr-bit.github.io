<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realheckerrr-bit | Aero Station</title>
    <style>
        :root {
            --main-bg: url('https://images.wallpaperscraft.com/image/single/surface_liquid_bubbles_140545_1920x1080.jpg');
            --glass: rgba(255, 255, 255, 0.3);
            --border: rgba(255, 255, 255, 0.5);
        }

        body {
            background: #0072ff var(--main-bg) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 0 20px rgba(255,255,255,0.4);
            width: 350px;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 25px rgba(255,255,255,0.8);
            margin-bottom: 15px;
        }

        h1 { margin: 10px 0; font-size: 26px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .typing-text {
            font-family: 'Consolas', monospace;
            font-size: 14px;
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 15px;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(200,220,255,0.7) 100%);
            color: #004ead;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            border: 1px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(255,255,255,0.5);
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .social-tag {
            background: rgba(255,255,255,0.2);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            text-decoration: none;
            color: white;
            border: 1px solid var(--border);
        }

        /* Контейнер для виджета Spotify */
        .spotify-widget {
            margin-top: 25px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://github.com/realheckerrr-bit.png" alt="User" class="avatar">
        <h1>realheckerrr-bit</h1>
        <div class="typing-text">System Enthusiast & Developer</div>

        <a href="https://github.com/realheckerrr-bit" class="btn">VIEW PROJECTS 📁</a>
        
        <div class="socials">
            <a href="https://t.me/h3cknn" class="social-tag">Telegram</a>
            <a href="https://youtube.com/@realheckerr" class="social-tag">YouTube</a>
        </div>
        <p style="font-size: 10px; margin-top: 10px; opacity: 0.8;">Discord: real.hecker</p>

        <div class="spotify-widget">
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/6U4Vq63ICh1UMu9vIscY9Y?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

</body>
</html>
