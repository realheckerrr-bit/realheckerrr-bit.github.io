<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realheckerrr-bit | Portfolio</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .avatar-container {
            position: relative;
            margin-bottom: 20px;
        }
        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: url('https://github.com/realheckerrr-bit.png');
            background-size: cover;
            border: 4px solid #30363d;
        }
        .status-dot {
            width: 15px;
            height: 15px;
            background-color: #23a55a;
            border: 3px solid #0d1117;
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            right: 10px;
        }
        .label {
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            color: #8b949e;
            margin-bottom: 10px;
        }
        h1 {
            font-family: monospace;
            font-size: 28px;
            margin: 0 0 15px 0;
        }
        .description {
            text-align: center;
            color: #8b949e;
            max-width: 300px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .tags {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
        }
        .tag {
            background: #21262d;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            color: #8b949e;
            border: 1px solid #30363d;
        }
        .btn {
            display: block;
            width: 220px;
            padding: 12px 0;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 12px;
            transition: 0.3s;
        }
        .btn-white {
            background-color: #ffffff;
            color: #000000;
        }
        .btn-outline {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #30363d;
        }
        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="avatar-container">
        <div class="avatar"></div>
        <div class="status-dot"></div>
    </div>

    <div class="label">Developer</div>
    <h1>realheckerrr-bit_</h1>

    <div class="description">
        windows / linux / android dev learning to build apps & roms.<br>
        streamer on twitch, videos on youtube.
    </div>

    <div class="tags">
        <span class="tag">#linux</span>
        <span class="tag">#android</span>
        <span class="tag">#dev</span>
    </div>

    <a href="https://github.com/realheckerrr-bit" class="btn btn-white">my projects </></a>
    <a href="#" class="btn btn-outline">socials 🔗</a>

</body>
</html>
