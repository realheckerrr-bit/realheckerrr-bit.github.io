<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realheckerrr-bit | Aero Station</title>
    <style>
        :root {
            --bg-image: url('bg.jpg');
            --glass: rgba(255, 255, 255, 0.2);
            --border: rgba(255, 255, 255, 0.5);
        }

        body {
            background: #0072ff var(--bg-image) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* Ефект глянцевого скла на весь екран */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(165deg, 
                rgba(255,255,255,0.4) 0%, 
                rgba(255,255,255,0.1) 40%, 
                rgba(255,255,255,0) 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* Бульбашки */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            bottom: -60px;
            z-index: 1;
            animation: rise 10s infinite linear;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.4);
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(1.3); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.3), 
                inset 0 0 30px rgba(255,255,255,0.3);
            width: 320px;
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 30px rgba(255,255,255,0.6);
            margin-bottom: 15px;
        }

        h1 { font-size: 26px; margin: 5px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .description {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 500;
            font-size: 14px;
            background: rgba(0,0,0,0.2);
            padding: 6px 15px;
            border-radius: 20px;
            margin-bottom: 25px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn {
            display: block;
            margin: 15px 0;
            padding: 15px;
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(210,230,255,0.85) 100%);
            color: #004ead;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            border: 1px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: white;
            box-shadow: 0 12px 25px rgba(255,255,255,0.4);
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .social-link {
            background: rgba(255,255,255,0.15);
            padding: 10px 18px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .social-link:hover {
            background: rgba(255,255,255,0.35);
        }

        .footer-text {
            font-size: 10px;
            margin-top: 20px;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="bubbles"></div>

    <div class="container">
        <img src="https://github.com/realheckerrr-bit.png" alt="Avatar" class="avatar">
        <h1>realheckerrr-bit</h1>
        <div class="description">14 y.o. | GSI / Android / Linux dev</div>

        <a href="https://github.com/realheckerrr-bit" class="btn" target="_blank">View Projects 📁</a>
        
        <div class="socials">
            <a href="https://t.me/h3cknn" class="social-link" target="_blank">Telegram</a>
            <a href="https://youtube.com/@realheckerr" class="social-link" target="_blank">YouTube</a>
        </div>

        <p class="footer-text">Discord: real.hecker</p>
    </div>

    <script>
        const bContainer = document.getElementById('bubbles');
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 40 + 15 + 'px';
            b.style.width = size;
            b.style.height = size;
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = Math.random() * 5 + 7 + 's';
            bContainer.appendChild(b);
            setTimeout(() => b.remove(), 10000);
        }
        setInterval(createBubble, 700);
    </script>
</body>
</html>
