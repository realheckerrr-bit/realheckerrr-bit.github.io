<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realheckerrr-bit | Aero Station</title>
    <style>
        :root {
            /* Фон зафіксовано, переконайся що bg.jpg є в репозиторії */
            --bg-image: url('bg.jpg');
            --glass: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.4);
        }

        body {
            background: #0072ff var(--bg-image) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Анімовані бульбашки */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            bottom: -50px;
            z-index: 1;
            animation: rise 12s infinite linear;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 2px solid var(--border);
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35), inset 0 0 25px rgba(255,255,255,0.25);
            width: 340px;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .container::-webkit-scrollbar { display: none; }

        .avatar {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 25px rgba(255,255,255,0.6);
            margin-bottom: 10px;
        }

        .description {
            font-family: monospace;
            font-size: 13px;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(200,230,255,0.9) 100%);
            color: #0056b3;
            text-decoration: none;
            border-radius: 18px;
            font-weight: bold;
            border: 1px solid white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .btn:hover { transform: scale(1.02); background: white; }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .social-link {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        .spotify-widget {
            margin-top: 25px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            height: 152px; /* Фіксована висота, щоб не стрибало */
            background: rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div id="bubbles"></div>

    <div class="container">
        <img src="https://github.com/realheckerrr-bit.png" alt="Avatar" class="avatar">
        <h1>realheckerrr-bit</h1>
        <div class="description">14 y.o. | Windows / Linux / Android Dev</div>

        <a href="https://github.com/realheckerrr-bit" class="btn" target="_blank">View Projects 📁</a>
        
        <div class="social-row">
            <a href="https://t.me/h3cknn" class="social-link" target="_blank">Telegram</a>
            <a href="https://youtube.com/@realheckerr" class="social-link" target="_blank">YouTube</a>
        </div>

        <div class="spotify-widget">
            <iframe style="border-radius:12px" src="googleusercontent.com/spotify.com/06" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <p style="font-size: 10px; margin-top: 15px; opacity: 0.7;">Discord: real.hecker</p>
    </div>

    <script>
        // Скрипт для створення плавних бульбашок
        const bContainer = document.getElementById('bubbles');
        function createBubble() {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 30 + 10 + 'px';
            b.style.width = size;
            b.style.height = size;
            b.style.left = Math.random() * 100 + '%';
            b.style.animationDuration = Math.random() * 5 + 8 + 's';
            bContainer.appendChild(b);
            setTimeout(() => b.remove(), 12000);
        }
        setInterval(createBubble, 800);
    </script>
</body>
</html>
