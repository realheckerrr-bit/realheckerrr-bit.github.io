<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realheckerrr-bit | Aero Station</title>
    <style>
        :root {
            /* Переконайся, що файл bg.jpg завантажений у репозиторій */
            --bg-image: url('bg.jpg');
            --glass: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.4);
        }

        body {
            background: #0072ff var(--bg-image) no-repeat center center;
            background-attachment: fixed; /* ЗАФІКСОВАНИЙ ФОН */
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Глянцевий ефект поверх фону */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
            z-index: 2;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--border);
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.3);
            width: 340px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.7);
            margin-bottom: 10px;
        }

        h1 { font-size: 24px; margin: 5px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .description {
            font-family: monospace;
            font-size: 13px;
            background: rgba(0,0,0,0.25);
            padding: 5px 12px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 14px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(180,210,255,0.8));
            color: #004ead;
            text-decoration: none;
            border-radius: 18px;
            font-weight: bold;
            border: 1px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.03);
            background: white;
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .social-link {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 12px;
            border: 1px solid var(--border);
        }

        .spotify-widget {
            margin-top: 25px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://github.com/realheckerrr-bit.png" alt="Avatar" class="avatar">
        <h1>realheckerrr-bit</h1>
        <div class="description">14 y.o. | Windows / Linux / Android Dev</div>

        <a href="https://github.com/realheckerrr-bit" class="btn" target="_blank">View Projects 📁</a>
        
        <div class="social-row">
            <a href="https://t.me/h3cknn" class="social-link" target="_blank">Telegram</a>
            <a href="https://youtube.com/@realheckerr" class="social-link" target="_blank">YouTube</a>
        </div>

        <div class="spotify-widget">
            <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/626141154483586135" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <p style="font-size: 10px; margin-top: 15px; opacity: 0.7;">Discord: real.hecker</p>
    </div>

</body>
</html>
