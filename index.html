<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realheckerrr-bit | Aero Station</title>
    <style>
        :root {
            /* Твоя картинка из Pinterest */
            --bg-image: url('https://i.pinimg.com/originals/91/97/35/919735667e6c38222441999971936384.jpg');
            --glass: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.4);
        }

        body {
            background: #0072ff var(--bg-image) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Глянцевый блик на весь экран */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.2);
            width: 340px;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none; /* Скрываем скролл для чистоты */
        }

        .container::-webkit-scrollbar { display: none; }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            margin-bottom: 10px;
        }

        h1 { font-size: 24px; margin: 5px 0; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }

        .typing {
            font-family: monospace;
            font-size: 13px;
            background: rgba(0,0,0,0.2);
            padding: 4px 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 12px;
            background: linear-gradient(180deg, rgba(255,255,255,0.95) 0%, rgba(200,225,255,0.85) 100%);
            color: #0052b4;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            border: 1px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.02);
            background: white;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .social-link {
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-size: 11px;
            border: 1px solid var(--border);
        }

        .spotify-container {
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://github.com/realheckerrr-bit.png" alt="User" class="avatar">
        <h1>realheckerrr-bit</h1>
        <div class="typing">Windows / Linux / Android Dev</div>

        <a href="https://github.com/realheckerrr-bit" class="btn">VIEW PROJECTS 📁</a>
        
        <div class="socials">
            <a href="https://t.me/h3cknn" class="social-link">Telegram</a>
            <a href="https://youtube.com/@realheckerr" class="social-link">YouTube</a>
        </div>

        <div class="spotify-container">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/track/1P6M265o7V3a47Xl8vLz3C" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        
        <p style="font-size: 10px; margin-top: 15px; opacity: 0.6;">Discord: real.hecker</p>
    </div>

</body>
</html>
