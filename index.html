<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>realheckerrr-bit | Aero Station</title>
    <style>
        :root {
            /* Картинка має бути завантажена в репозиторій як bg.jpg */
            --bg-image: url('bg.jpg');
            --glass: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.4);
        }

        body {
            background: #0072ff var(--bg-image) no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Глянцевий ефект на весь екран */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
            z-index: 2;
        }

        /* Анімовані пухирці на фоні */
        .bubbles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            bottom: -100px;
            animation: rise 10s infinite ease-in;
        }
        @keyframes rise {
            0% { bottom: -100px; transform: translateX(0); opacity: 0.5; }
            50% { opacity: 0.8; }
            100% { bottom: 110vh; transform: translateX(100px); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--border);
            border-radius: 35px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 0 20px rgba(255,255,255,0.3);
            width: 340px;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(255,255,255,0.7);
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .avatar:hover { transform: rotate(5deg) scale(1.05); }

        h1 { font-size: 24px; margin: 5px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        .description {
            font-family: monospace;
            font-size: 13px;
            background: rgba(0,0,0,0.25);
            padding: 5px 12px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .btn {
            display: block;
            margin: 10px 0;
            padding: 14px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(180,210,255,0.8));
            color: #004ead;
            text-decoration: none;
            border-radius: 18px;
            font-weight: bold;
            border: 1px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn:hover {
            transform: scale(1.03);
            background: white;
            box-shadow: 0 8px 25px rgba(255,255,255,0.5);
        }

        .social-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .social-link {
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 12px;
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .social-link:hover { background: rgba(255,255,255,0.4); }

        .spotify-widget {
            margin-top: 25px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="bubbles" id="bubble-container"></div>

    <div class="container">
        <img src="https://github.com/realheckerrr-bit.png" alt="Avatar" class="avatar">
        <h1>realheckerrr-bit</h1>
        <div class="description">Windows / Linux / Android Dev</div>

        <a href="https://github.com/realheckerrr-bit" class="btn" target="_blank">View Projects 📁</a>
        
        <div class="social-row">
            <a href="https://t.me/h3cknn" class="social-link" target="_blank">Telegram</a>
            <a href="https://youtube.com/@realheckerr" class="social-link" target="_blank">YouTube</a>
        </div>

        <div class="spotify-widget">
            <iframe data-testid="embed-iframe" style="border-radius:12px" src="googleusercontent.com/spotify.com/04" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <p style="font-size: 10px; margin-top: 15px; opacity: 0.7;">Discord: real.hecker</p>
    </div>

    <script>
        const container = document.getElementById('bubble-container');
        for (let i = 0; i < 15; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.style.left = Math.random() * 100 + '%';
            b.style.width = b.style.height = (Math.random() * 40 + 15) + 'px';
            b.style.animationDuration = (Math.random() * 5 + 7) + 's';
            b.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(b);
        }
    </script>
</body>
</html>
